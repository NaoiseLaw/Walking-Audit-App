name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Deploy to Vercel
        run: |
          echo "Vercel deployment will be triggered automatically via GitHub integration"
          echo "Configure Vercel to watch this repository at: https://vercel.com/new"
