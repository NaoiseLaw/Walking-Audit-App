name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Upload source to Vercel and trigger a cloud build (same as GitHub integration).
      # rootDirectory:frontend is applied by Vercel's cloud — no local build needed.
      - name: Deploy to production
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_xVqbcuh5PXXBqKRXgUWN1QAW
          VERCEL_PROJECT_ID: prj_kDKbHkvvTzmuzY8gKkktUb0n9r0y
